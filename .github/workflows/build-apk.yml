name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: build-apk-installable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Prepare web files for APK
        run: |
          rm -rf app/src/main/assets/www
          mkdir -p app/src/main/assets/www
          rsync -av ./ app/src/main/assets/www/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'app' \
            --exclude 'build' \
            --exclude '.gradle' \
            --exclude 'backend' \
            --exclude 'backend-gemini' \
            --exclude 'node_modules'

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Prepare installable APK artifact
        run: |
          mkdir -p apk-installable
          cp app/build/outputs/apk/debug/app-debug.apk apk-installable/MontageIA.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Montage-IA-A-INSTALLER
          path: apk-installable/MontageIA.apk
