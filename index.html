<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1115" />
  <title>Montage IA Mobile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-dark">
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <button id="backButton" class="icon-btn hidden" type="button" aria-label="Retour">←</button>
        <div>
          <p class="eyebrow">Application personnelle</p>
          <h1 id="appTitle">Montage IA Mobile</h1>
        </div>
      </div>

      <div class="topbar-right">
        <button id="themeToggle" class="chip-btn" type="button">Mode clair</button>
      </div>
    </header>

    <main class="app-main">
      <div id="screen"></div>
    </main>

    <nav id="bottomNav" class="bottom-nav hidden">
      <button class="bottom-tab active" type="button" data-route="dashboard">Accueil</button>
      <button class="bottom-tab" type="button" data-route="projects">Projets</button>
      <button class="bottom-tab" type="button" data-route="settings">Réglages</button>
    </nav>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
